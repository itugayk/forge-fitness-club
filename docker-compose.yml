services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: forge-fitness:latest
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    # No host port binding: Coolify's reverse proxy (Traefik) routes to port 80
    # via the assigned domain. For purely-local use, add `ports: ["8080:80"]`.
    expose:
      - "80"
    environment:
      # Coolify magic var: exposes the "app" service on port 80 via its proxy
      # (Traefik) and provides the generated URL as $SERVICE_FQDN_APP.
      SERVICE_FQDN_APP_80: "/"
      APP_NAME: "Forge Fitness Club"
      APP_ENV: production
      APP_KEY: "base64:wFlAGt07apYs7a5nt4B8i4pGBOElnIMFsUDxrC/XUQA="
      APP_DEBUG: "false"
      # SERVICE_URL_APP carries the scheme (https://...) Coolify derives from the
      # domain; SERVICE_FQDN_APP is host-only and yielded a scheme-less APP_URL.
      APP_URL: "${SERVICE_URL_APP:-http://localhost}"
      APP_LOCALE: tr
      APP_FALLBACK_LOCALE: en
      APP_FAKER_LOCALE: tr_TR
      APP_TIMEZONE: Europe/Istanbul
      LOG_CHANNEL: stderr
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: forge_fitness
      DB_USERNAME: forge
      DB_PASSWORD: secret
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    volumes:
      - storage_data:/var/www/html/storage/app

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: forge_fitness
      MYSQL_USER: forge
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  mysql_data:
  storage_data:
